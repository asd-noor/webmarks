<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Webmarks</h1>
            <div class="controls">
                <button id="export-browser-btn">Export to Browser</button>
                <button id="export-btn">Export JSON</button>
                <button id="trigger-import-btn">Import JSON</button>
                <input type="file" id="import-file" accept=".json" style="display: none;" />
            </div>
        </header>

        <div id="search-wrap">
            <input type="text" id="search-input" placeholder="Filter... | / history | > chrome:// | !bang | : url | : /path/to/file">
            <button id="untagged-btn">untagged</button>
            <ul id="history-suggestions" hidden></ul>
        </div>
        <div id="webmark-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
